name: Deploy ogp-generator

on:
  push:
    branches: [main]
    paths:
      - 'crates/ogp-generator/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Run tests
        run: cargo test -p ogp-generator

      - name: Run clippy
        run: cargo clippy -p ogp-generator -- -D warnings

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build -p ogp-generator --release

      - name: Deploy binary to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "$SSH_KEY" > /tmp/deploy_key
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i /tmp/deploy_key -P "$DEPLOY_PORT" \
              target/release/ogp-generator \
              "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/ogp-generator.new"
          ssh -i /tmp/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "chmod +x $DEPLOY_PATH/ogp-generator.new && \
               mv $DEPLOY_PATH/ogp-generator.new $DEPLOY_PATH/ogp-generator"
          rm -f /tmp/deploy_key
