name: Deploy ogp-generator

on:
  push:
    branches: [main]
    paths:
      - 'crates/ogp-generator/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Run tests
        run: cargo test -p ogp-generator

      - name: Run clippy
        run: cargo clippy -p ogp-generator -- -D warnings

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build -p ogp-generator --release

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HGN_PRIVATE_KEY }}

      - name: Deploy binary to server
        env:
          DEPLOY_HOST: ${{ vars.SSH_HOST }}
          DEPLOY_PORT: ${{ vars.SSH_PORT }}
          DEPLOY_USER: ${{ vars.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" \
              target/release/ogp-generator \
              "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/ogp-generator.new"
          ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "chmod +x $DEPLOY_PATH/ogp-generator.new && \
               mv $DEPLOY_PATH/ogp-generator.new $DEPLOY_PATH/ogp-generator"
